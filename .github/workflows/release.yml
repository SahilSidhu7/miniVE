name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # Create the draft release up front so the four build jobs attach to the same
  # release id — letting tauri-action create it races and produces duplicate drafts.
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > body.md <<'EOF'
          Disposable Docker-backed dev environments.

          **Requires [Docker Desktop](https://www.docker.com/products/docker-desktop/) running.**

          | OS | File |
          |---|---|
          | Windows | `.msi` (or `-setup.exe`) |
          | macOS Apple Silicon | `_aarch64.dmg` |
          | macOS Intel | `_x64.dmg` |
          | Linux | `.AppImage` or `.deb` |

          The `minive` CLI ships as the `minive-cli-*` assets — the one-line installers set it up automatically.

          macOS/Windows builds are unsigned — see [install docs](https://github.com/SahilSidhu7/miniVE#install) for the one-time OS warning bypass.
          EOF
          gh release create "$GITHUB_REF_NAME" --draft --title "miniVE $GITHUB_REF_NAME" --notes-file body.md --repo "$GITHUB_REPOSITORY"
          id=$(gh api "repos/$GITHUB_REPOSITORY/releases" --jq "[.[] | select(.draft and .tag_name==\"$GITHUB_REF_NAME\")][0].id")
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            cli_src: src-tauri/target/aarch64-apple-darwin/release/minive
            cli_asset: minive-cli-macos-aarch64.tar.gz
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            cli_src: src-tauri/target/x86_64-apple-darwin/release/minive
            cli_asset: minive-cli-macos-x86_64.tar.gz
          - platform: ubuntu-22.04
            args: ""
            cli_src: src-tauri/target/release/minive
            cli_asset: minive-cli-linux-x86_64.tar.gz
          - platform: windows-latest
            args: ""
            cli_src: src-tauri/target/release/minive.exe
            cli_asset: minive-cli-windows-x86_64.zip
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      # The `minive` CLI is a second bin in the same crate; the tauri build above
      # already compiled its dependencies, so this is nearly free.
      - name: Build CLI
        run: cargo build --release --bin minive --manifest-path src-tauri/Cargo.toml ${{ matrix.args }}

      - name: Package CLI (unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cp ${{ matrix.cli_src }} minive
          tar -czf ${{ matrix.cli_asset }} minive

      - name: Package CLI (windows)
        if: matrix.platform == 'windows-latest'
        run: Compress-Archive -Path ${{ matrix.cli_src }} -DestinationPath ${{ matrix.cli_asset }}

      # Upload by release id — `gh release upload <tag>` is ambiguous while
      # multiple drafts share a tag.
      - name: Upload CLI to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${{ matrix.cli_asset }}" \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/${{ needs.create-release.outputs.release_id }}/assets?name=${{ matrix.cli_asset }}" \
            -o /dev/null
